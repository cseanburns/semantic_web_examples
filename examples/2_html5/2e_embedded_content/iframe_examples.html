<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Iframe Examples</title>
        <link rel="stylesheet" href="../../../css/examples.css">
    </head>
    <body>
        <header>
            <p class="eyebrow">Lesson 2e Example</p>
            <h1>Iframe Examples</h1>
            <nav>
                <ul class="inline-list">
                    <li><a href="index.html">Lesson index</a></li>
                    <li><a href="../../../index.html">Examples index</a></li>
                </ul>
            </nav>
        </header>

        <main class="grid">
            <section class="card">
                <h2>External Embed</h2>
                <iframe width="560" height="315"
                    src="https://www.youtube.com/embed/5fYeKiebpuo?si=QcvAjF13AjhGkHMq"
                    title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen></iframe>
            </section>

            <section class="card">
                <h2>Local HTML Embed</h2>
                <iframe width="400" height="400" src="../../../media/inner_frame.html" title="Local iframe example"></iframe>
            </section>
        </main>
    </body>
</html>
