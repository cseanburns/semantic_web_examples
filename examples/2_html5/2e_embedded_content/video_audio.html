<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Video and Audio</title>
        <link rel="stylesheet" href="../../../css/examples.css">
    </head>
    <body>
        <header>
            <p class="eyebrow">Lesson 2e Example</p>
            <h1>Video and Audio</h1>
            <nav>
                <ul class="inline-list">
                    <li><a href="index.html">Lesson index</a></li>
                    <li><a href="../../../index.html">Examples index</a></li>
                </ul>
            </nav>
        </header>

        <main class="grid">
            <section class="card">
                <h2>Video Element</h2>
                <video controls muted width="640">
                    <source src="../../../media/owl.webm" type="video/webm">
                    <source src="../../../media/owl.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </section>

            <section class="card">
                <h2>Audio Element</h2>
                <audio controls>
                    <source src="../../../media/semantic.mp3" type="audio/mpeg">
                    <source src="../../../media/semantic.ogg" type="audio/ogg">
                    Your browser does not support the audio element.
                </audio>
            </section>
        </main>
    </body>
</html>
