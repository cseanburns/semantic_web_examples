<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<style>

body {
	background: #000;
	margin: auto;
}
.a {
	background: blue;
	width: 100px;
	height: 100px;
	position: fixed;
	top: 0;
	left: 0;
	color: white;
}
.b {
	background: red;
	width: 100px;
	height: 100px;
	position: fixed;
	bottom: 0;
	left: 0;
}
.c {
	background: green;
	width: 100px;
	height: 100px;
	position: fixed;
	top: 0;
	right: 0;
}
.d {
	background: yellow;
	width: 100px;
	height: 100px;
	position: fixed;
	bottom: 0;
	right: 0;
}
		</style>

		<body>
			<div class="a">This is a test.</div>
			<div class="b">This is a test.</div>
			<div class="c">This is a test.</div>
			<div class="d">This is a test.</div>
		</body>
</html>
